# primitives/list_backups.yml
# ---------------------------------------------------------------------------
# Primitive: list_backups
# Variables required:
#   backup_server_ip   - IP of central backup server
#   backup_server_user - SSH user on backup server
#   backup_base_path   - base path on backup server
#   filter_machine     - (optional) hostname to filter by; default = current host
# ---------------------------------------------------------------------------

- name: "[list_backups] Set machine filter"
  ansible.builtin.set_fact:
    list_machine: "{{ filter_machine | default(inventory_hostname) }}"

# ── Linux control node: SSH into backup server and list meta files ─────────
- name: "[list_backups] List .meta.json files on backup server"
  ansible.builtin.shell: |
    ssh -o StrictHostKeyChecking=no \
        {{ backup_server_user }}@{{ backup_server_ip }} \
        "ls {{ backup_base_path }}/{{ list_machine }}/*.meta.json 2>/dev/null || echo NONE"
  delegate_to: localhost
  register: meta_file_list
  changed_when: false

- name: "[list_backups] Read each metadata file from backup server"
  ansible.builtin.shell: |
    ssh -o StrictHostKeyChecking=no \
        {{ backup_server_user }}@{{ backup_server_ip }} \
        "cat {{ item }}"
  delegate_to: localhost
  loop: "{{ meta_file_list.stdout_lines | reject('equalto', 'NONE') | list }}"
  register: meta_contents
  changed_when: false
  when: meta_file_list.stdout != "NONE"

- name: "[list_backups] Display backup list"
  ansible.builtin.debug:
    msg: "{{ item.stdout }}"
  loop: "{{ meta_contents.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  when: meta_contents is defined and meta_contents.results | length > 0

- name: "[list_backups] Report when no backups found"
  ansible.builtin.debug:
    msg: "No backups found for machine: {{ list_machine }}"
  when: meta_file_list.stdout == "NONE"
