# primitives/restore_backup.yml
# Restores a backup from C:\BackupStorage (Windows) or local path (Linux)

- name: "[restore_backup] Set local staging path"
  ansible.builtin.set_fact:
    restore_staging_dir: "/tmp/restore_staging"
    restore_staging_dir_win: "C:\\Temp\\restore_staging"

# ── Linux ──────────────────────────────────────────────────────────────────
- name: "[restore_backup][Linux] Ensure staging directory exists"
  ansible.builtin.file:
    path: "{{ restore_staging_dir }}"
    state: directory
    mode: '0755'
  when: ansible_os_family != "Windows"

- name: "[restore_backup][Linux] Ensure restore target exists"
  ansible.builtin.file:
    path: "{{ restore_target }}"
    state: directory
    mode: '0755'
  when: ansible_os_family != "Windows"

- name: "[restore_backup][Linux] Extract archive to target"
  ansible.builtin.unarchive:
    src: "{{ backup_dest }}/{{ backup_id }}"
    dest: "{{ restore_target }}"
    remote_src: yes
  when: ansible_os_family != "Windows"

# ── Windows ────────────────────────────────────────────────────────────────
- name: "[restore_backup][Windows] Ensure staging directory exists"
  ansible.windows.win_file:
    path: "{{ restore_staging_dir_win }}"
    state: directory
  when: ansible_os_family == "Windows"

- name: "[restore_backup][Windows] Check backup exists in BackupStorage"
  ansible.windows.win_stat:
    path: "C:\\BackupStorage\\{{ backup_id }}"
  when: ansible_os_family == "Windows"
  register: backup_file_stat

- name: "[restore_backup][Windows] Fail if backup not found"
  ansible.builtin.fail:
    msg: "❌ Backup not found: C:\\BackupStorage\\{{ backup_id }}"
  when:
    - ansible_os_family == "Windows"
    - not backup_file_stat.stat.exists

- name: "[restore_backup][Windows] Ensure restore target exists"
  ansible.windows.win_file:
    path: "{{ restore_target }}"
    state: directory
  when: ansible_os_family == "Windows"

- name: "[restore_backup][Windows] Extract ZIP to restore target"
  ansible.windows.win_shell: |
    $src  = "C:\BackupStorage\{{ backup_id }}"
    $dest = "{{ restore_target }}"
    Expand-Archive -Path $src -DestinationPath $dest -Force
    Write-Output "✅ Restored {{ backup_id }} to $dest"
  when: ansible_os_family == "Windows"
  register: restore_result

- name: "[restore_backup][Windows] Show restore result"
  ansible.builtin.debug:
    msg: "{{ restore_result.stdout }}"
  when:
    - ansible_os_family == "Windows"
    - restore_result is defined

- name: "[restore_backup][Windows] Cleanup staging"
  ansible.windows.win_file:
    path: "{{ restore_staging_dir_win }}"
    state: absent
  when: ansible_os_family == "Windows"
