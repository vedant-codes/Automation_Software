- name: Revoke admin privileges
  hosts: all
  # No top-level 'become' to keep Windows happy

  tasks:
    # --- Linux: Remove the custom sudoers file ---
    - name: Linux revoke sudo access
      file:
        path: "/etc/sudoers.d/{{ user }}"
        state: absent
      become: yes
      when: ansible_os_family != "Windows"

    # --- Windows: Remove user from Administrators group ---
    - name: Windows revoke admin access
      win_group_membership:
        name: Administrators
        members:
          - "{{ user }}"
        state: absent
      when: ansible_os_family == "Windows"
