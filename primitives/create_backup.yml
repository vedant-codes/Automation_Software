# primitives/create_backup.yml
# ---------------------------------------------------------------------------
# Primitive: create_backup
# Variables required:
#   backup_source      - path to file/folder to back up
#   backup_dest        - local staging destination on the managed node
#   backup_server_ip   - IP of central backup server
#   backup_server_user - SSH user on backup server
#   backup_base_path   - base path on backup server  (e.g. /mnt/backups)
# ---------------------------------------------------------------------------

- name: "[create_backup] Set backup filename"
  ansible.builtin.set_fact:
    backup_timestamp: "{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}{{ ansible_date_time.second }}"
    backup_source_name: "{{ backup_source | basename }}"

- name: "[create_backup] Set full backup archive name"
  ansible.builtin.set_fact:
    backup_archive_name: "{{ backup_source_name }}_backup_{{ backup_timestamp }}.tar.gz"
    backup_meta_name: "{{ backup_source_name }}_backup_{{ backup_timestamp }}.meta.json"

# ── Linux ──────────────────────────────────────────────────────────────────
- name: "[create_backup][Linux] Ensure staging directory exists"
  ansible.builtin.file:
    path: "{{ backup_dest }}"
    state: directory
    mode: '0755'
  when: ansible_os_family != "Windows"

- name: "[create_backup][Linux] Create tar.gz archive"
  ansible.builtin.archive:
    path: "{{ backup_source }}"
    dest: "{{ backup_dest }}/{{ backup_archive_name }}"
    format: gz
  when: ansible_os_family != "Windows"
  register: linux_archive_result

- name: "[create_backup][Linux] Compute SHA256 checksum"
  ansible.builtin.stat:
    path: "{{ backup_dest }}/{{ backup_archive_name }}"
    checksum_algorithm: sha256
  when: ansible_os_family != "Windows"
  register: linux_checksum

- name: "[create_backup][Linux] Write metadata sidecar"
  ansible.builtin.copy:
    dest: "{{ backup_dest }}/{{ backup_meta_name }}"
    content: |
      {
        "backup_id":   "{{ backup_archive_name }}",
        "source":      "{{ backup_source }}",
        "destination": "{{ backup_dest }}",
        "timestamp":   "{{ backup_timestamp }}",
        "platform":    "Linux",
        "hostname":    "{{ inventory_hostname }}",
        "checksum":    "{{ linux_checksum.stat.checksum }}",
        "size_bytes":  {{ linux_checksum.stat.size }}
      }
    mode: '0644'
  when: ansible_os_family != "Windows"

- name: "[create_backup][Linux] Sync archive to backup server"
  ansible.posix.synchronize:
    src: "{{ backup_dest }}/{{ backup_archive_name }}"
    dest: "{{ backup_server_user }}@{{ backup_server_ip }}:{{ backup_base_path }}/{{ inventory_hostname }}/"
    mode: push
  when: ansible_os_family != "Windows"

- name: "[create_backup][Linux] Sync metadata to backup server"
  ansible.posix.synchronize:
    src: "{{ backup_dest }}/{{ backup_meta_name }}"
    dest: "{{ backup_server_user }}@{{ backup_server_ip }}:{{ backup_base_path }}/{{ inventory_hostname }}/"
    mode: push
  when: ansible_os_family != "Windows"

# ── Windows ────────────────────────────────────────────────────────────────
- name: "[create_backup][Windows] Ensure staging directory exists"
  ansible.windows.win_file:
    path: "{{ backup_dest }}"
    state: directory
  when: ansible_os_family == "Windows"

- name: "[create_backup][Windows] Create ZIP archive"
  ansible.windows.win_shell: |
    Compress-Archive -Path "{{ backup_source }}" `
                     -DestinationPath "{{ backup_dest }}\{{ backup_archive_name }}" `
                     -Force
  when: ansible_os_family == "Windows"

- name: "[create_backup][Windows] Compute SHA256 checksum"
  ansible.windows.win_shell: |
    (Get-FileHash "{{ backup_dest }}\{{ backup_archive_name }}" -Algorithm SHA256).Hash
  when: ansible_os_family == "Windows"
  register: win_checksum

- name: "[create_backup][Windows] Write metadata sidecar"
  ansible.windows.win_copy:
    dest: "{{ backup_dest }}\\{{ backup_meta_name }}"
    content: |
      {
        "backup_id":   "{{ backup_archive_name }}",
        "source":      "{{ backup_source }}",
        "destination": "{{ backup_dest }}",
        "timestamp":   "{{ backup_timestamp }}",
        "platform":    "Windows",
        "hostname":    "{{ inventory_hostname }}",
        "checksum":    "{{ win_checksum.stdout | trim }}",
        "size_bytes":  0
      }
  when: ansible_os_family == "Windows"

- name: "[create_backup][Windows] Copy archive to backup server via SCP"
  ansible.windows.win_shell: |
    scp -o StrictHostKeyChecking=no `
        "{{ backup_dest }}\{{ backup_archive_name }}" `
        {{ backup_server_user }}@{{ backup_server_ip }}:{{ backup_base_path }}/{{ inventory_hostname }}/
  when: ansible_os_family == "Windows"

- name: "[create_backup][Windows] Copy metadata to backup server via SCP"
  ansible.windows.win_shell: |
    scp -o StrictHostKeyChecking=no `
        "{{ backup_dest }}\{{ backup_meta_name }}" `
        {{ backup_server_user }}@{{ backup_server_ip }}:{{ backup_base_path }}/{{ inventory_hostname }}/
  when: ansible_os_family == "Windows"
