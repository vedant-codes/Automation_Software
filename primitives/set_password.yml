- name: Set password
  hosts: all
  # REMOVED become: yes from here to prevent Windows failure

  tasks:
    - name: Linux set password
      user:
        name: "{{ user }}"
        # Linux REQUIRES a salted hash (SHA512), not plain text
        password: "{{ password_hash }}"
      become: yes
      when: ansible_os_family != "Windows"

    - name: Windows set password
      win_user:
        name: "{{ user }}"
        # Windows via WinRM accepts plain text over the encrypted connection
        password: "{{ password }}"
      when: ansible_os_family == "Windows"
