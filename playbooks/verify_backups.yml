---
# playbooks/verify_backups.yml

- name: "Verify All Backup Integrity"
  hosts: "{{ target_hosts | default('lab') }}"
  gather_facts: yes
  vars:
    backup_storage: "C:\\BackupStorage"

  tasks:

    - name: "[Windows] List all zip files in BackupStorage"
      ansible.windows.win_shell: |
        $files = Get-ChildItem "C:\BackupStorage" -Filter "*.zip" -ErrorAction SilentlyContinue
        if ($files) {
          $files | ForEach-Object { Write-Output $_.Name }
        } else {
          Write-Output "NONE"
        }
      when: ansible_os_family == "Windows"
      register: win_backup_list
      changed_when: false

    - name: "[Windows] Report no backups found"
      ansible.builtin.debug:
        msg: "No backups found in C:\\BackupStorage"
      when:
        - ansible_os_family == "Windows"
        - win_backup_list.stdout | trim == "NONE"

    - name: "[Windows] Verify each backup checksum"
      ansible.windows.win_shell: |
        $backupName = "{{ item }}"
        $zipPath = "C:\BackupStorage\$backupName"
        $metaName = $backupName -replace '\.zip$', '.meta.json'
        $metaPath = "C:\BackupStorage\$metaName"
        if (-not (Test-Path $zipPath)) {
          Write-Output "ERROR: zip not found"
          exit 1
        }
        if (-not (Test-Path $metaPath)) {
          Write-Output "ERROR: meta not found"
          exit 1
        }
        $actualHash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToUpper()
        $metaRaw = Get-Content $metaPath -Raw
        $storedHash = ([regex]::Match($metaRaw, '"checksum"\s*:\s*"([^"]+)"')).Groups[1].Value.ToUpper()
        if ($actualHash -eq $storedHash) {
          Write-Output "VALID: $backupName checksum matches ($actualHash)"
        } else {
          Write-Output "CORRUPTED: $backupName stored=$storedHash actual=$actualHash"
          exit 1
        }
      loop: >-
        {{
          win_backup_list.stdout_lines
          | reject('equalto', 'NONE')
          | reject('equalto', '')
          | list
        }}
      register: verify_results
      when:
        - ansible_os_family == "Windows"
        - win_backup_list.stdout | trim != "NONE"
      changed_when: false

    - name: "[Windows] Show verification results"
      ansible.builtin.debug:
        msg: "{{ item.stdout }}"
      loop: "{{ verify_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - ansible_os_family == "Windows"
        - verify_results is defined

    - name: "Verification Summary"
      ansible.builtin.debug:
        msg: "Verified {{ verify_results.results | default([]) | length }} backup(s) on {{ inventory_hostname }}"
      when: verify_results is defined
