---
# playbooks/verify_backups.yml
# ---------------------------------------------------------------------------
# Task 4: Verify Backup Integrity
# Problem: Backups might get corrupted due to storage issues.
# Solution: Validate every backup using checksum comparison.
# Linux Tool : sha256sum (via stat module)
# Windows Tool: certutil / Get-FileHash
# ---------------------------------------------------------------------------

- name: "Verify All Backup Integrity"
  hosts: "{{ target_hosts | default('lab') }}"
  gather_facts: yes
  vars:
    backup_server_ip:   "{{ groups['backup_server'][0] }}"
    backup_server_user: "backup_admin"
    backup_base_path:   "/mnt/backups"
    filter_machine:     "{{ target_machine | default(inventory_hostname) }}"

  tasks:

    - name: "List all backup IDs for this machine on backup server"
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no \
            {{ backup_server_user }}@{{ backup_server_ip }} \
            "ls {{ backup_base_path }}/{{ filter_machine }}/*.tar.gz \
                 {{ backup_base_path }}/{{ filter_machine }}/*.zip \
                 2>/dev/null || echo NONE"
      delegate_to: localhost
      register: backup_file_list
      changed_when: false

    - name: "Set backup IDs list"
      ansible.builtin.set_fact:
        backup_ids_to_verify: >-
          {{
            backup_file_list.stdout_lines
            | reject('equalto', 'NONE')
            | map('basename')
            | list
          }}

    - name: "Report when no backups found"
      ansible.builtin.debug:
        msg: "No backups to verify for machine: {{ filter_machine }}"
      when: backup_ids_to_verify | length == 0

    - name: "Verify each backup"
      ansible.builtin.include_tasks: ../primitives/verify_backup.yml
      vars:
        backup_id: "{{ item }}"
      loop: "{{ backup_ids_to_verify }}"
      loop_control:
        label: "{{ item }}"
      when: backup_ids_to_verify | length > 0
      # ignore_errors so a corrupted backup doesn't stop the rest
      ignore_errors: yes
      register: verify_results

    - name: "Verification Summary"
      ansible.builtin.debug:
        msg: >-
          Verified {{ backup_ids_to_verify | length }} backup(s) for {{ filter_machine }}.
          Check individual task results above for VALID / CORRUPTED status.
      when: backup_ids_to_verify | length > 0
