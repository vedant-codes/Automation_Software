# primitives/list_users.yml
- name: List users
  hosts: all

  tasks:
    - name: Linux users
      command: "cut -d: -f1 /etc/passwd"
      register: users_linux
      when: ansible_os_family != "Windows"

    - debug:
        var: users_linux.stdout_lines
      when: ansible_os_family != "Windows"

    - name: Windows users
      win_command: "net user"
      register: users_win
      when: ansible_os_family == "Windows"

    - debug:
        var: users_win.stdout_lines
      when: ansible_os_family == "Windows"